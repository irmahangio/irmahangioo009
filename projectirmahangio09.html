<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aplikasi Catatan Harian</title>
    <style>
      /* Bagian CSS untuk Tampilan */
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #eef2f7;
        padding: 20px;
        display: flex;
        justify-content: center;
      }
      .container {
        width: 100%;
        max-width: 450px;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      h2 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 20px;
      }

      /* Style untuk Search Bar */
      .search-box {
        margin-bottom: 15px;
        width: 100%;
        padding: 10px;
        border: 2px solid #007bff;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 14px;
        outline: none;
      }

      textarea {
        width: 100%;
        height: 100px;
        padding: 12px;
        border: 1px solid #ced4da;
        border-radius: 8px;
        box-sizing: border-box;
        resize: none;
        font-size: 14px;
      }
      button {
        width: 100%;
        padding: 12px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 15px;
        font-weight: bold;
        transition: 0.3s;
      }
      button:hover {
        background-color: #0056b3;
      }
      .note-list {
        margin-top: 25px;
      }
      .note-item {
        background: #fff;
        padding: 15px;
        border-left: 5px solid #007bff;
        margin-bottom: 12px;
        position: relative;
        border-radius: 6px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        transition: transform 0.2s;
      }
      .note-item:hover {
        transform: scale(1.02);
      }
      .note-item small {
        color: #888;
        display: block;
        margin-bottom: 5px;
      }
      .note-item p {
        margin: 0;
        color: #333;
        line-height: 1.5;
      }
      .delete-btn {
        position: absolute;
        right: 12px;
        top: 12px;
        color: #dc3545;
        cursor: pointer;
        font-size: 18px;
        opacity: 0.6;
      }
      .delete-btn:hover {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Catatan Harianku</h2>

      <input
        type="text"
        id="searchInput"
        class="search-box"
        placeholder="🔍 Cari catatan..."
        onkeyup="displayNotes()"
      />

      <textarea
        id="noteInput"
        placeholder="Tulis rencana atau kegiatan hari ini..."
      ></textarea>
      <button onclick="addNote()">Simpan Catatan</button>

      <div id="noteList" class="note-list"></div>
    </div>

    <script>
      /* Bagian JavaScript untuk Logika */

      document.addEventListener("DOMContentLoaded", displayNotes);

      function addNote() {
        const noteInput = document.getElementById("noteInput");
        const noteText = noteInput.value;

        if (noteText.trim() === "") {
          alert("Harap isi catatan terlebih dahulu!");
          return;
        }

        const notes = JSON.parse(localStorage.getItem("myNotes") || "[]");

        const newNote = {
          text: noteText,
          date: new Date().toLocaleString("id-ID"),
        };

        notes.unshift(newNote);
        localStorage.setItem("myNotes", JSON.stringify(notes));

        noteInput.value = "";
        displayNotes();
      }

      function displayNotes() {
        const noteList = document.getElementById("noteList");
        const searchText = document
          .getElementById("searchInput")
          .value.toLowerCase(); // Ambil input pencarian
        const notes = JSON.parse(localStorage.getItem("myNotes") || "[]");

        noteList.innerHTML = "";

        // Filter catatan berdasarkan teks pencarian
        const filteredNotes = notes.filter((note) =>
          note.text.toLowerCase().includes(searchText),
        );

        filteredNotes.forEach((note, index) => {
          // Kita cari index asli di array 'notes' agar fungsi hapus tidak salah hapus
          const originalIndex = notes.indexOf(note);

          noteList.innerHTML += `
                <div class="note-item">
                    <span class="delete-btn" onclick="deleteNote(${originalIndex})">&times;</span>
                    <small>${note.date}</small>
                    <p>${note.text}</p>
                </div>
            `;
        });

        // Pesan jika hasil cari tidak ditemukan
        if (filteredNotes.length === 0 && searchText !== "") {
          noteList.innerHTML =
            "<p style='text-align:center; color:#888;'>Catatan tidak ditemukan...</p>";
        }
      }

      function deleteNote(index) {
        if (confirm("Hapus catatan ini?")) {
          const notes = JSON.parse(localStorage.getItem("myNotes") || "[]");
          notes.splice(index, 1);
          localStorage.setItem("myNotes", JSON.stringify(notes));
          displayNotes();
        }
      }
    </script>
  </body>
</html>
